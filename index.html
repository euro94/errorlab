<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ErrorLab" />
  <meta name="theme-color" content="#c77d20" />
  <title>ErrorLab</title>
  <meta name="description" content="Mass-log Becker CPA errors, FSRS-spaced re-testing, daily mini-sessions, and pattern tracking." />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <span class="brand">
      <svg class="brand-icon" viewBox="0 0 512 512" width="28" height="28"><path d="M256 112L256 240M200 240L312 240L352 400Q352 432 256 432Q160 432 160 400L200 240" stroke="currentColor" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M196 340Q196 400 256 400Q316 400 316 340" stroke="currentColor" stroke-width="20" stroke-linecap="round" fill="none" opacity="0.4"/><g transform="translate(256,288)"><line x1="-40" y1="-40" x2="40" y2="40" stroke="currentColor" stroke-width="24" stroke-linecap="round"/><line x1="40" y1="-40" x2="-40" y2="40" stroke="currentColor" stroke-width="24" stroke-linecap="round"/></g></svg>
      <span class="brand-text">ErrorLab</span>
    </span>
    <span class="spacer"></span>
    <button class="iconbtn" id="themeBtn" title="Toggle theme" aria-label="Toggle theme">◐</button>
  </header>

  <nav class="nav" aria-label="Sections">
    <a href="#/log" data-route="log" class="active">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span>Log</span>
    </a>
    <a href="#/errors" data-route="errors">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z"/><line x1="16" y1="16" x2="8" y2="16"/><line x1="16" y1="12" x2="8" y2="12"/><line x1="10" y1="8" x2="8" y2="8"/></svg>
      <span>Errors</span>
    </a>
    <a href="#/retest" data-route="retest">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      <span>Re-Test</span>
    </a>
    <a href="#/mini" data-route="mini">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>Mini</span>
    </a>
    <a href="#/dashboard" data-route="dashboard">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Stats</span>
    </a>
  </nav>

  <main class="app" id="root" role="main"></main>

  <script type="module" src="./app.js"></script>
  <script>
    document.getElementById("themeBtn").addEventListener("click", () => {
      if (window.__errorlabToggleTheme) window.__errorlabToggleTheme();
    });
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch((e) => console.warn("SW failed", e)));
    }
  </script>
</body>
</html>
