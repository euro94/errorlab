<script type="module">
/* ===================== FAR LEDGER — vanilla PWA ===================== */
import { fsrs, createEmptyCard, Rating, generatorParameters } from './fsrs.js';

// domain
const PASS=78, MASTER_DAYS=21, TAU=14, DAY=86400000;
const EXAM=new Date('2026-08-15').getTime();
const NODES={ 'Iconceptual':['Conceptual framework','Going concern','Ratios & FS analysis'],'I-FS':['Balance sheet','Income stmt & disc ops','Comprehensive income/OCI','Stmt changes equity','Cash flows','Notes & disclosures','Segment reporting','Interim reporting'],'I-Other':['Not-for-profit','Special-purpose frameworks','SEC reporting'],'I-SLG':['Measurement focus/basis','Fund types','Fund FS','Government-wide stmts','Fund-to-gov-wide reconciliation','Budgetary & encumbrances','Net position/fund balance','MD&A & RSI'],'II-BS':['Cash & equivalents','Trade receivables','Inventory costing','Inventory valuation (LCM/LCNRV)','PP&E capitalization & interest','PP&E depreciation','PP&E impairment & disposal','Investments debt securities','Investments equity & method','Intangibles amortization','Goodwill & impairment','Payables & accrued','Debt bonds & effective-interest','Debt costs/modification/TDR','Equity stock','Equity treasury','Equity dividends/splits/RE'],'III-Tx':['Revenue recog (ASC 606)','Leases lessee (842)','Leases lessor (842)','Income taxes (ASC 740)','Business combinations','Consolidations (NCI/eliminations)','Acct changes & errors','Contingencies & commitments','Fair value (ASC 820)','Foreign currency','Nonmonetary exchanges','Subsequent events','Stock comp (ASC 718)','Pensions/benefits (ASC 715)','Derivatives & hedging (ASC 815)','Software & R&D costs','Not-for-profit transactions']};
const NODE_AREA=Object.fromEntries(Object.entries(NODES).flatMap(([g,arr])=>{const a=g.split('-')[0];return arr.map(n=>[n,a]);}));
const AREA_NAME={I:'Financial reporting',II:'Balance sheet accounts',III:'Select transactions'};
const BLUEPRINT={I:35,II:35,III:30};
const REASONS=[['conceptual','Conceptual'],['application','Application'],['computational','Computational'],['misread','Misread'],['trap','Trap'],['pacing','Pacing'],['incomplete','Incomplete'],['stale','Stale']];
const SKILLS=[['ru','Remembering'],['app','Application'],['ana','Analysis']];
const OUTCOMES={mastered:{l:'Mastered',c:'var(--green)'},fragile:{l:'Fragile',c:'var(--amber)'},gap:{l:'Honest gap',c:'var(--teal)'},misconception:{l:'Misconception',c:'var(--coral)'}};

// FSRS
const f = fsrs(generatorParameters({request_retention:0.9,enable_fuzz:false}));
function applyGrade(st,grade,now=Date.now()){
  const c = st.reps>0?f.repeat(st,new Date(st.lastReview||now))[grade].card:createEmptyCard(new Date());
  if(grade===Rating.Again)c.reps=(c.reps||0)+1,c.lapses=(c.lapses||0)+1;
  return c;
}
function freshNode(){return createEmptyCard(new Date());}
function fmtDue(due){const d=(due||Date.now())-Date.now();if(d<=0)return'now';if(d<3600000)return Math.round(d/60000)+'m';if(d<DAY)return Math.round(d/3600000)+'h';return Math.round(d/DAY)+'d';}
function outcome(correct,conf){return correct?(conf>=4?'mastered':'fragile'):(conf>=4?'misconception':'gap');}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8);}

// storage
const KQ='far:q',KC='far:c',KN='far:n';
function load(){let q=[],c=[],n={};try{const x=JSON.parse(localStorage.getItem(KQ)||'[]');q=x.map(e=>({...e,createdAt:e.createdAt||Date.now(),retests:e.retests||[]}));c=JSON.parse(localStorage.getItem(KC)||'[]');n=JSON.parse(localStorage.getItem(KN)||'{}');}catch(e){}return{q,c,n};}
function saveQ(q){localStorage.setItem(KQ,JSON.stringify(q));}
function saveC(c){localStorage.setItem(KC,JSON.stringify(c));}
function saveN(n){localStorage.setItem(KN,JSON.stringify(n));}

// AI proxy
async function extractFromImage(b64){
  const c=await new Promise(r=>{const i=new Image();i.onload=()=>{const cv=document.createElement('canvas');cv.width=cv.height=1200;const ratio=Math.min(1200/i.width,1200/i.height);cv.width=i.width*ratio;cv.height=i.height*ratio;cv.getContext('2d').drawImage(i,0,0,cv.width,cv.height);r(cv.toDataURL('image/jpeg',0.85))};i.src=b64;});
  const res=await fetch('/api/extract',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:c})});
  if(!res.ok)throw new Error('AI failed: '+res.status);
  return res.json();
}

// fingerprint
function fp(o){const n=(o?.mcqNumber||'').replace(/[^a-z0-9]/gi,'').toLowerCase();if(n)return'n:'+n;const s=(o?.stem||'').toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,120);return s?'h:'+s:'';}

// readiness
function computeReadiness(qs){
  const now=Date.now(),fresh=qs.filter(q=>q.firstExposure).sort((a,b)=>a.createdAt-b.createdAt);
  const rolling=fresh.slice(-200),raw=rolling.length?Math.round(100*rolling.filter(q=>q.correct).length/rolling.length):0;
  const byArea={};fresh.forEach(q=>{const a=NODE_AREA[q.node];if(!a)return;if(!byArea[a])byArea[a]={w:0,c:0,n:0};const wt=Math.exp(-((now-q.createdAt)/DAY)/TAU);byArea[a].w+=wt;byArea[a].c+=wt*(q.correct?1:0);byArea[a].n++;});
  const present=['I','II','III'].filter(a=>byArea[a]?.n>0);let weighted=0,areaAcc={};const totW=present.reduce((s,a)=>s+BLUEPRINT[a],0)||1;
  present.forEach(a=>{const acc=byArea[a].w?byArea[a].c/byArea[a].w:0;areaAcc[a]=Math.round(acc*100);weighted+=(BLUEPRINT[a]/totW)*acc;});
  weighted=present.length?Math.round(weighted*100):0;
  const coverage=['I','II','III'].filter(a=>!byArea[a]?.n);
  let bw=0,bs=0,pm={1:.1,2:.3,3:.5,4:.7,5:.9};
  rolling.forEach(q=>{const w=Math.exp(-((now-q.createdAt)/DAY)/TAU);bw+=w;bs+=w*Math.pow((pm[q.confidence]||.5)-(q.correct?1:0),2);});
  const brier=bw?(bs/bw).toFixed(3):null;
  let proj=null;
  if(fresh.length>=20){
    const span=fresh.slice(-120),h=Math.floor(span.length/2),e=span.slice(0,h),l=span.slice(h);
    const aE=e.filter(q=>q.correct).length/e.length,aL=l.filter(q=>q.correct).length/l.length;
    const tE=e.reduce((s,q)=>s+q.createdAt,0)/e.length,tL=l.reduce((s,q)=>s+q.createdAt,0)/l.length,dDays=(tL-tE)/DAY;
    if(dDays>=2){const slope=(aL-aE)*100/dDays,daysToExam=Math.max(0,(EXAM-now)/DAY);proj={proj:Math.max(0,Math.min(100,Math.round(weighted+slope*daysToExam))),slopePerWeek:Math.round(slope*7*10)/10,daysToExam:Math.round(daysToExam)};}
  }
  return{weighted,raw,n:rolling.length,brier,areaAcc,present,coverage,projection:proj};
}

// app
const app=document.getElementById('app');
let tab='capture',qs=[],cs=[],nodes={};
({q:qs,c:cs,n:nodes}=load());

function render(){app.innerHTML='';const el=tab==='capture'?Capture():tab==='cards'?Cards():tab==='study'?Study():Stats();app.appendChild(el);}

function Topbar(){const d=document.createElement('div');d.className='topbar';d.innerHTML=`<div class="brand"><span class="br-i">◐</span><span class="br-n">FAR Ledger</span><span class="br-s">peak</span></div><div class="top-meta">Aug 15 · ${qs.length} logged</div>`;return d;}
function Tabbar(){const d=document.createElement('div');d.className='tabbar';
  const tabs=[['capture','Capture'],['cards','Cards'],['study','Study'],['stats','Stats']];
  const icons={capture:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>',
    cards:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>',
    study:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>',
    stats:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>'
  };
  const pending=cs.filter(c=>c.status==='draft').length;
  const dueN=new Set(cs.filter(c=>c.status==='scheduled').map(c=>c.node));
  const dueCount=[...dueN].filter(n=>(nodes[n]?.due??Date.now())<=Date.now()).length;
  tabs.forEach(([t,label])=>{
    const btn=document.createElement('button');btn.className='tab'+(tab===t?' on':'');
    btn.innerHTML=`${icons[t]}<span>${label}</span>`;
    if(t==='cards'&&pending)btn.innerHTML+=`<span class="dot">${pending}</span>`;
    if(t==='study'&&dueCount)btn.innerHTML+=`<span class="dot">${dueCount}</span>`;
    btn.onclick=()=>{tab=t;render();};d.appendChild(btn);
  });
  return d;
}

function Capture(){
  const d=document.createElement('div');d.className='capture';
  const ready=computeReadiness(qs);
  let img=null,fields=null,correct=null,confidence=3,reason='',skill='',node='',secs='',busy=false;

  function reset(){img=null;fields=null;correct=null;confidence=3;reason='';skill='';node='';secs='';renderC();}
  function renderC(){
    d.innerHTML='';
    const rh=document.createElement('div');rh.className='readiness compact';rh.innerHTML=`<div class="rd-h"><span class="rd-l">Readiness</span><span class="rd-s">last ${ready.n||0} fresh</span></div><div class="rd-n"><span class="rd-b">${ready.n?ready.weighted:'—'}</span><span class="rd-p">%</span></div><div class="rd-m"><div class="rd-f" style="width:${ready.weighted||0}%"></div><div class="rd-pl" style="left:${PASS}%"><span>pass ${PASS}</span></div></div>`;
    d.appendChild(rh);

    if(!img){
      const sh=document.createElement('button');sh.className='shoot';
      sh.innerHTML=`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg><b>Capture a question</b><small>Screenshot the MCQ + explanation</small>`;
      const fi=document.createElement('input');fi.type='file';fi.accept='image/*';fi.capture='environment';fi.hidden=true;
      sh.onclick=()=>fi.click();
      fi.onchange=async e=>{
        const f=e.target.files[0];if(!f)return;
        const rd=new FileReader();rd.onload=async()=>{
          img=rd.result;renderC();busy=true;renderC();
          try{fields=await extractFromImage(img);busy=false;renderC();}catch(er){busy=false;fields={stem:''};renderC();}
        };rd.readAsDataURL(f);
      };
      d.appendChild(sh);d.appendChild(fi);
      d.appendChild(el('p','hint',{s:'font-size:11px;color:var(--muted2);text-align:center;margin-top:10px'},'Vision reads the stem, choices, your pick, and rationale.'));
      return;
    }

    if(busy){d.appendChild(el('div','panel',{s:'text-align:center;padding:20px'},'<span class="spin" style="display:inline-block;width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--teal);border-radius:50%;animation:s 1s linear infinite;vertical-align:middle;margin-right:8px"></span>Reading...'));return;}

    const seenSet=new Set(qs.map(q=>q.fp||'').filter(Boolean));
    const fprint=fields?fp(fields):'';
    const computedFresh=!(fprint&&seenSet.has(fprint));

    // Show preview + "Tag it" button
    let popupStep=0; // 0=preview, 1=right/wrong, 2=confidence, 3=reason(if weak), 4=node, 5=skill, 6=save
    function renderC2(){
      d.innerHTML='';
      // Image preview
      if(img){
        const pv=el('div','panel');pv.innerHTML=`<div style="margin-bottom:8px;display:flex;justify-content:space-between;align-items:center"><span style="font-weight:600;font-size:12px">Extracted</span><button class="btn ghost" style="padding:6px 10px;font-size:11px" id="bdisc">Discard</button></div><img class="shot-pre" src="${img}" />`;
        if(fields){
          pv.innerHTML+=`<div style="margin-top:8px"><textarea class="ta" id="estem" rows="2" style="font-size:12px">${(fields.stem||'').replace(/</g,'&lt;')}</textarea><div style="display:flex;gap:6px;margin-top:6px"><input class="inp" id="emy" value="${(fields.myAnswer||'').replace(/"/g,'&quot;')}" placeholder="Your pick" style="flex:1;font-size:12px"/><input class="inp" id="ecr" value="${(fields.correctAnswer||'').replace(/"/g,'&quot;')}" placeholder="Correct" style="flex:1;font-size:12px"/></div></div>`;
        }
        d.appendChild(pv);
        d.querySelector('#bdisc')?.addEventListener('click',reset);
      }

      // Current picks summary
      if(correct!==null){
        const oc=outcome(correct,confidence),om=OUTCOMES[oc];
        d.innerHTML+=`<div class="panel" style="display:grid;gap:6px;font-size:12px">
          <div style="display:flex;justify-content:space-between"><span>Outcome</span><span style="color:${om.c};font-weight:600">${om.l}</span></div>
          ${reason?`<div style="display:flex;justify-content:space-between"><span>Why</span><span style="color:var(--muted)">${REASONS.find(r=>r[0]===reason)?.[1]||reason}</span></div>`:''}
          ${node?`<div style="display:flex;justify-content:space-between"><span>Node</span><span style="color:var(--teal)">${node}</span></div>`:''}
          ${skill?`<div style="display:flex;justify-content:space-between"><span>Skill</span><span>${SKILLS.find(s=>s[0]===skill)?.[1]||skill}</span></div>`:''}
          <div style="display:flex;justify-content:space-between"><span>Confidence</span><span>${confidence}/5</span></div>
          <div style="display:flex;justify-content:space-between"><span>Exposure</span><span style="color:${computedFresh?'var(--teal)':'var(--amber)'}">${computedFresh?'Fresh':'Repeat'}</span></div>
        </div>`;
      }

      // Action button
      const bar=el('div','save-bar');
      if(correct===null){
        bar.innerHTML='<button class="btn primary" id="btag">Tag it →</button>';
      }else if(!node){
        bar.innerHTML='<button class="btn primary" id="btag">Pick node →</button>';
      }else{
        const isWeak=correct===false||(correct===true&&confidence<4);
        bar.innerHTML=`<button class="btn primary" id="bsave">${isWeak?'Log + make card':'Log question'}</button>`;
      }
      d.appendChild(bar);

      // Wire
      d.querySelector('#btag')?.addEventListener('click',()=>{
        if(correct===null){
          showPopup('Got it right?',['✓ Right','✗ Wrong'],v=>{
            correct=v.startsWith('✓');
            showPopup('Confidence?',['1 — guess','2 — low','3 — medium','4 — high','5 — certain'],v2=>{
              confidence=parseInt(v2);
              const isWeak=correct===false||(correct===true&&confidence<4);
              if(isWeak){
                showPopup('Why did you miss it?',REASONS.map(r=>r[1]),v3=>{
                  reason=REASONS.find(r=>r[1]===v3)?.[0]||'';
                  showPopup('Content node',Object.values(NODES).flat(),v4=>{node=v4;renderC2();});
                });
              }else{
                showPopup('Content node',Object.values(NODES).flat(),v4=>{node=v4;renderC2();});
              }
            });
          });
        }else if(!node){
          showPopup('Content node',Object.values(NODES).flat(),v=>{node=v;renderC2();});
        }
      });
      d.querySelector('#bsave')?.addEventListener('click',async()=>{
        if(!node)return;
        const stm=d.querySelector('#estem')?.value||fields?.stem||'';
        const myA=d.querySelector('#emy')?.value||fields?.myAnswer||'';
        const crA=d.querySelector('#ecr')?.value||fields?.correctAnswer||'';
        const oc=outcome(correct,confidence),qid=uid();
        qs=[{id:qid,fp:fprint,stem:stm,myAnswer:myA,correctAnswer:crA,correct,confidence,reason,skill,node,timeSeconds:secs?Number(secs):null,firstExposure:computedFresh,outcome:oc,retests:[],createdAt:Date.now()},...qs];saveQ(qs);
        const isWeak=correct===false||(correct===true&&confidence<4);
        if(isWeak){cs=[{id:uid(),questionId:qid,node,reason,outcome:oc,front:`${node}: ${stm.slice(0,80)}...`,back:`Correct: ${crA}.`,trap:'',status:'draft',createdAt:Date.now()},...cs];saveC(cs);}
        reset();
      });
    }
    renderC2();
  }
  renderC();return d;
}

function Cards(){
  const d=document.createElement('div');d.className='capture';
  const [filter,setFilter]=React_state('draft');
  const pending=cs.filter(c=>c.status==='draft'),scheduled=cs.filter(c=>c.status==='scheduled'),all=cs;
  const list=filter==='draft'?pending:filter==='scheduled'?scheduled:all;
  
  function renderCards(){
    d.innerHTML='';
    const fdiv=el('div','filters');
    [['draft','Drafts',pending.length],['scheduled','In deck',scheduled.length],['all','All']].forEach(([v,l,n])=>{
      const chip=el('button','chip'+(filter===v?' on':''));chip.textContent=l;if(n>0)chip.innerHTML+=` <span class="chip-n">${n}</span>`;
      chip.onclick=()=>{setFilter(v);renderCards();};fdiv.appendChild(chip);

    if(!list.length){d.appendChild(el('div','empty','<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><h3>'+(filter==='draft'?'No drafts':'Nothing here')+'</h3><p>'+(filter==='draft'?'Capture a miss to generate a card.':'Send a draft to the deck to schedule its node.')+'</p>'));return;}

    list.forEach(c=>{
      const q=qs.find(x=>x.id===c.questionId);
      const item=el('div','card-item');
      item.innerHTML=`<div class="card-m"><span class="ntag">${c.node}</span><span style="font-size:10px;color:${OUTCOMES[c.outcome]?.c||'var(--muted)'}">${OUTCOMES[c.outcome]?.l||''}</span>${c.status==='scheduled'?'<span style="margin-left:auto;font-size:10px;color:var(--muted)">in deck</span>':''}</div>`;
      if(c.front)item.innerHTML+=`<div class="cf-f">${c.front||'— empty —'}</div>`;
      if(c.back){item.innerHTML+=`<div class="cf-d"></div><div class="cf-b">${c.back}</div>`;}
      if(c.trap)item.innerHTML+=`<div class="cf-t">${c.trap}</div>`;
      item.innerHTML+=`<div class="ca">
        <button class="ca-btn" data-edit="${c.id}">✏️ Edit</button>
        <button class="ca-btn" data-regen="${c.id}">🔄 Redo</button>
        ${c.status==='draft'?`<button class="ca-btn" data-sched="${c.id}" style="color:var(--teal);border-color:var(--teal);margin-left:auto">✨ To deck</button>`:''}
        <button class="ca-btn" data-del="${c.id}" style="color:var(--coral)">🗑</button></div>`;

      // wire card actions
      setTimeout(()=>{
        item.querySelector('[data-edit]')?.addEventListener('click',()=>{
          const nf=prompt('Front:',c.front);if(nf!==null)c.front=nf;
          const nb=prompt('Back:',c.back);if(nb!==null)c.back=nb;
          saveC(cs);renderCards();
        });
        item.querySelector('[data-regen]')?.addEventListener('click',async()=>{
          const stem=q?.stem||'';const myA=q?.myAnswer||'';const crA=q?.correctAnswer||'';
          item.innerHTML='<div style="padding:12px;text-align:center;color:var(--muted)"><span class="spin" style="display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--teal);border-radius:50%;animation:s 1s linear infinite"></span> regenerating...</div>';
          try{
            const res=await fetch('/api/extract',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:'',extra:true,stem,myAnswer:myA,correctAnswer:crA,node:c.node,reason:c.reason})});
            if(res.ok){const g=await res.json();c.front=g.front||c.front;c.back=g.back||c.back;c.trap=g.trap||c.trap;saveC(cs);}

          renderCards();
        });
        item.querySelector('[data-del]')?.addEventListener('click',()=>{cs=cs.filter(x=>x.id!==c.id);saveC(cs);renderCards();});
      },0);
      d.appendChild(item);
    });
  }
  renderCards();return d;
}

function Study(){
  const d=document.createElement('div');d.className='capture';
  const scheduled=cs.filter(c=>c.status==='scheduled');
  const nodeNames=[...new Set(scheduled.map(c=>c.node))];
  const dueNodes=nodeNames.map(n=>({n,st:nodes[n]||freshNode()})).filter(x=>(x.st.due||0)<=Date.now()).sort((a,b)=>(a.st.due||0)-(b.st.due||0));

  if(!dueNodes.length){d.innerHTML='<div class="empty"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg><h3>Deck clear</h3><p>No nodes due. Send a draft to the deck to start the loop.</p></div>';return d;}

  const currentNode=dueNodes[0].n,nodeState=nodes[currentNode]||freshNode();
  const pool=scheduled.filter(c=>c.node===currentNode).sort((a,b)=>(a.lastShown||0)-(b.lastShown||0));
  const card=pool[0];
  let show=false;
  function renderStudy(){
    d.innerHTML='';
    d.innerHTML+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:11px"><span class="ntag">${currentNode}</span><span class="muted tiny">${dueNodes.length} nodes due · ${pool.length} cards</span></div>`;
    const sc=el('div','study-card');
    sc.innerHTML=`<div class="sc-f">${card.front}</div>${!show?`<button class="reveal" id="rev">Show answer</button>`:`<div class="cf-d" style="margin:14px 0"></div><div class="sc-b">${card.back}</div>${card.trap?`<div class="cf-t" style="margin-top:10px">${card.trap}</div>`:''}`}`;
    d.appendChild(sc);
    if(show){
      const gb=el('div','grade-bar');
      [{g:1,l:'Again',c:'g1'},{g:2,l:'Hard',c:'g2'},{g:3,l:'Good',c:'g3'},{g:4,l:'Easy',c:'g4'}].forEach(({g,l,c})=>{
        const btn=el('button','grade '+c);const ns=applyGrade(nodeState,g);
        btn.innerHTML=`<b>${l}</b><small>${fmtDue(ns.due)}</small>`;
        btn.onclick=()=>{
          nodes[currentNode]=ns;saveN(nodes);
          cs=cs.map(x=>x.id===card.id?{...x,lastShown:Date.now()}:x);saveC(cs);
          if(ns.intervalDays>=MASTER_DAYS)qs=qs.map(q=>q.node===currentNode&&q.status!=='mastered'?{...q,status:'mastered'}:q);
          tab='study';render();
        };
        gb.appendChild(btn);
      });
      d.appendChild(gb);
    }
    d.querySelector('#rev')?.addEventListener('click',()=>{show=true;renderStudy();});
  }
  renderStudy();return d;
}

function Stats(){
  const d=document.createElement('div');d.style.display='flex';d.style.flexDirection='column';d.style.gap='14px';
  const r=computeReadiness(qs);
  const fresh=qs.filter(q=>q.firstExposure);

  // readiness
  const rc=el('div','readiness');const a=r.n?r.weighted:null;
  rc.style.setProperty('--rc',a==null?'var(--muted)':a>=PASS?'var(--green)':a>=PASS-8?'var(--amber)':'var(--coral)');
  rc.innerHTML=`<div class="rd-h"><span class="rd-l">Readiness</span><span class="rd-s">exam-weighted · last ${r.n||0} fresh</span></div><div class="rd-n"><span class="rd-b">${a==null?'—':a}</span><span class="rd-p">%</span></div><div class="rd-m"><div class="rd-f" style="width:${a||0}%"></div><div class="rd-pl" style="left:${PASS}%"><span>pass ${PASS}</span></div></div><div class="rd-v">${a==null?'Log fresh questions to build the readiness line.':a>=PASS?'Above the line, blueprint-weighted. On track.':`${PASS-a} pts under — drill the weakest nodes below.`}</div>`;
  d.appendChild(rc);

  // projection
  if(r.projection){
    const p=r.projection,ok=p.proj>=PASS,col=ok?'var(--green)':'var(--coral)';
    const pr=el('div','panel');pr.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:600;font-size:12px">Projected Aug 15</div><div style="font-size:10px;color:var(--muted)">${p.slopePerWeek>=0?'+':''}${p.slopePerWeek} pts/wk · ${p.daysToExam}d</div></div><div style="text-align:right"><div style="font-family:monospace;font-weight:700;font-size:24px;color:${col}">${p.proj}<small style="font-size:12px;opacity:.7">%</small></div><div style="font-size:9px;color:${col}">${ok?'on track':`${PASS-p.proj} short`}</div></div></div>`;
    d.appendChild(pr);
  }

  // areas
  const ab=el('div','panel');ab.innerHTML=`<div class="ph">By exam area <span class="muted tiny">blueprint ${BLUEPRINT.I}/${BLUEPRINT.II}/${BLUEPRINT.III}</span></div>`;
  ['I','II','III'].forEach(a=>{
    const has=r.present.includes(a),acc=r.areaAcc[a]??0;
    ab.innerHTML+=`<div style="margin-bottom:10px"><div class="ar-top"><span class="ar-id">${a}</span><span class="ar-name">${AREA_NAME[a]}</span><span class="ar-val" style="color:${!has?'var(--muted2)':acc>=PASS?'var(--green)':'var(--amber)'}">${has?acc+'%':'no data'}</span></div><div class="nb-tr"><div class="nb-f" style="width:${has?acc:0}%;background:${acc>=PASS?'var(--green)':'var(--amber)'}"></div><div class="nb-l" style="left:${PASS}%"></div></div></div>`;
    if(r.coverage.includes(a))ab.innerHTML+=`<div class="muted tiny" style="margin-bottom:6px">No fresh data in Area ${a}</div>`;
  });
  d.appendChild(ab);

  // funnel
  const funnel={logged:qs.length,weak:0,remediating:0,mastered:0,retested:0};
  qs.forEach(q=>{if(['fragile','gap','misconception'].includes(q.outcome))funnel.weak++;if(q.status==='remediating')funnel.remediating++;if(q.status==='mastered')funnel.mastered++;if(q.status==='retested')funnel.retested++;});
  const fn=el('div','panel');fn.innerHTML=`<div class="ph">Remediation funnel</div><div style="display:flex;justify-content:space-between;text-align:center">${[{l:'Logged',n:funnel.logged},{l:'Weak',n:funnel.weak,c:'var(--amber)'},{l:'FSRS',n:funnel.remediating,c:'var(--teal)'},{l:'Mastered',n:funnel.mastered,c:'var(--green)'},{l:'Retested',n:funnel.retested,c:'var(--green)'}].map((s,i)=>`<div><div style="font-family:monospace;font-weight:700;font-size:20px;color:${s.c||'var(--muted)'}">${s.n}</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase">${s.l}</div></div>`).join('')}</div>`;
  d.appendChild(fn);

  // weakest nodes
  const nodeMap={};fresh.forEach(q=>{if(!nodeMap[q.node])nodeMap[q.node]=[];nodeMap[q.node].push(q);});
  const nodeStats=Object.entries(nodeMap).map(([n,arr])=>({node:n,n:arr.length,acc:Math.round(100*arr.filter(x=>x.correct).length/arr.length)})).filter(x=>x.n>=3).sort((a,b)=>a.acc-b.acc);
  if(nodeStats.length){
    const ns=el('div','panel');ns.innerHTML=`<div class="ph">Weakest nodes <span class="muted tiny">fresh accuracy · ≥3</span></div>`;
    nodeStats.slice(0,10).forEach(s=>{ns.innerHTML+=`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span>${s.node}</span><span style="font-family:monospace;color:${s.acc>=PASS?'var(--green)':'var(--amber)'}">${s.acc}%</span></div><div class="nb-tr"><div class="nb-f" style="width:${s.acc}%;background:${s.acc>=PASS?'var(--green)':'var(--amber)'}"></div><div class="nb-l" style="left:${PASS}%"></div></div><div class="tiny muted" style="margin-top:2px">${s.n} fresh</div></div>`;});
    d.appendChild(ns);
  }

  // question log
  if(qs.length){
    const ql=el('div','panel');ql.innerHTML=`<div class="ph">Question log</div>`;
    let open=null;
    function renderLog(){
      ql.innerHTML='<div class="ph">Question log</div>';
      qs.slice(0,40).forEach(q=>{
        const row=el('div','qrw');
        row.innerHTML=`<button class="qrh"><span class="qo" style="background:${OUTCOMES[q.outcome]?.c||'var(--muted)'}"></span><span class="qi">${q.mcqNumber||'—'}</span><span class="qn">${q.node||''}</span>${!q.firstExposure?'<span class="qr">rpt</span>':''}<span class="qs">${q.outcome||'?'}</span></button>`;
        if(open===q.id){
          row.innerHTML+=`<div class="qrb">${q.stem?`<div class="qst">${q.stem.replace(/</g,'&lt;')}</div>`:''}<div class="qdt"><span>picked <b>${q.myAnswer||'?'}</b></span><span>correct <b>${q.correctAnswer||'?'}</b></span><span>conf ${q.confidence}/5</span>${q.reason?`<span>${q.reason}</span>`:''}${q.timeSeconds!=null?`<span>${q.timeSeconds}s</span>`:''}</div></div>`;
        }
        row.querySelector('.qrh').onclick=()=>{open=open===q.id?null:q.id;renderLog();};
        ql.appendChild(row);
      });
    }
    renderLog();d.appendChild(ql);
  }
  return d;
}

function el(tag,cls,html,opts={}){
